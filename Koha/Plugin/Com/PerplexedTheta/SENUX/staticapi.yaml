---
"/static_files/dist/senux.min.css":
  get:
    x-mojo-to: Static#get
    tags:
    - pluginStatic
    parameters:
      - description: Optionally specify a version
        name: version
        in: query
        required: false
        type: string
    responses:
      '200':
        description: File found
        schema:
          type: file
      '400':
        description: Bad request
        schema:
          type: object
          properties:
            error:
              description: An explanation for the error
              type: string
      '404':
        description: File not found
        schema:
          type: object
          properties:
            error:
              description: An explanation for the error
              type: string
      '500':
        description: Internal server error
        schema:
          type: object
          properties:
            error:
              description: An explanation for the error
              type: string
